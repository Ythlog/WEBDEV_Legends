<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eduhub - Login</title>
  <link rel="stylesheet" href="/login/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page-wrapper">
    <div class="left-panel">
      <div class="left-brand">
        <img src="/login/2.png" alt="Eduhub Logo" class="brand-logo" />
        <span class="brand-name">Eduhub</span>
      </div>

      <div class="left-content">
        <h2 class="welcome-text">Hello, Welcome!</h2>
        <img src="/login/1.png" alt="Welcome Illustration" class="welcome-illustration" />
      </div>
    </div>

    <div class="right-panel">
      <div class="form-container" id="login-form">
        <h1 class="form-title">Login to your account</h1>
        <p class="form-subtitle">
          Don't have an account yet?
          <a href="#" class="switch-link" onclick="showSignup()">Click here to sign up.</a>
        </p>

        <div class="input-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" />
        </div>

        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" />
        </div>

        <div class="forgot-password">
          <a href="#" class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>
        </div>

        <button class="submit-btn" onclick="handleLogin()">Login account</button>
      </div>

      <div class="form-container hidden" id="forgot-form">
        <h1 class="form-title">Reset your password</h1>
        <p class="form-subtitle">
          Enter your username and we'll send you a reset link.
          <a href="#" class="switch-link" onclick="showLogin()">Back to login.</a>
        </p>

        <div class="input-group">
          <label for="forgot-username">Username</label>
          <input type="text" id="forgot-username" placeholder="Enter your username" />
        </div>

        <button class="submit-btn" onclick="handleForgotPassword()">Send reset link</button>
      </div>

      <div class="form-container hidden" id="signup-form">
        <h1 class="form-title">Create your account</h1>
        <p class="form-subtitle">
          Already have an account?
          <a href="#" class="switch-link" onclick="showLogin()">Click here to login.</a>
        </p>

        <div class="input-group">
          <label for="signup-firstname">First name</label>
          <input type="text" id="signup-firstname" placeholder="Enter your first name" />
        </div>

        <div class="input-group">
          <label for="signup-lastname">Last name</label>
          <input type="text" id="signup-lastname" placeholder="Enter your last name" />
        </div>

        <div class="input-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" placeholder="Choose a username" />
        </div>

        <div class="input-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label>Role</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="role" value="student" checked />
              <span>Student</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="role" value="teacher" />
              <span>Teacher</span>
            </label>
          </div>
        </div>

        <div class="input-group">
          <label for="signup-password">Create password</label>
          <input type="password" id="signup-password" placeholder="Enter your password" />
        </div>

        <button class="submit-btn" onclick="handleSignup()">Create account</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/login/login.js"></script>
</body>
</html>
